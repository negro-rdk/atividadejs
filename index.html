<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliação JavaScript - 20 Questões</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Avaliação JavaScript</h1>
    <p>Página simples com as 20 questões para testar no navegador.</p>

    <div class="botoes">
      <button onclick="questao1()">Cadastrar 3 alunos</button>
      <button onclick="questao2()">valores das idades</button>
      <button onclick="questao3()">Quantidade de alunos</button>
      <button onclick="questao4()">Verificar maioridade</button>
      <button onclick="questao5()">Classificar nota</button>
      <button onclick="questao6()">Menu de opções</button>
      <button onclick="questao7()">3 produtos</button>
      <button onclick="questao8()">imprimir elementos for</button>
      <button onclick="questao9()">soma total de numeros</button>
      <button onclick="questao10()">calculos de 3 notas</button>
      <button onclick="questao11()">situação de aluno/media</button>
      <button onclick="questao12()">nome com indices</button>
      <button onclick="questao13()">exibir maior idade</button>
      <button onclick="questao14()">clasificar cargos</button>
      <button onclick="questao15()">Adicionar nome</button>
      <button onclick="questao16()">nota para ver quantos alunos forma aprovados</button>
      <button onclick="questao17()">menu de adição a lista</button>
      <button onclick="questao18()">exibir objetos</button>
      <button onclick="questao19()">busca por nomes</button>
      <button onclick="questao20()">sistema de cadastro completo</button>
      <button onclick="limparSaida()">Limpar</button>
    </div>

    <div class="saida" id="saida">O resultado vai aparecer aqui.</div>
  </div>

  <script>
    const saida = document.getElementById("saida");
    let listaQ15 = ["João", "Maria"];
    let itensQ17 = [];
    let alunosSistema = [];

    function mostrar(texto) {
      saida.textContent = texto;
    }

    function limparSaida() {
      mostrar("O resultado vai aparecer aqui.");
    }

    function questao1() {
      let alunos = [];
      for (let i = 1; i <= 3; i++) {
        let nome = prompt(`Digite o nome do ${i}º aluno:`);
        alunos.push(nome);
      }
      mostrar("Alunos cadastrados:\n" + alunos.join("\n"));
      console.log(alunos);
    }

    function questao2() {
      let idades = [15, 18, 20, 22, 17];
      let texto = "Idades:\n";
      for (let i = 0; i < idades.length; i++) {
        texto += idades[i] + "\n";
      }
      mostrar(texto);
      console.log(idades);
    }

    function questao3() {
      let alunos = ["João", "Maria", "Carlos", "Ana"];
      mostrar("Quantidade de alunos: " + alunos.length);
      console.log(alunos.length);
    }

    function verificarMaioridade(idade) {
      if (isNaN(idade) || idade < 0) {
        return "Idade inválida";
      } else if (idade >= 18) {
        return "Maior de idade";
      } else {
        return "Menor de idade";
      }
    }

    function questao4() {
      let idade = Number(prompt("Digite a idade:"));
      let resultado = verificarMaioridade(idade);
      mostrar("Resultado: " + resultado);
      console.log(resultado);
    }

    function classificarNota(nota) {
      if (nota >= 7) {
        return "Aprovado";
      }
      return "Reprovado";
    }

    function questao5() {
      let nota = Number(prompt("Digite a nota:"));
      let resultado = classificarNota(nota);
      mostrar("Resultado: " + resultado);
      console.log(resultado);
    }

    function questao6() {
      let opcao = Number(prompt("Menu:\n1 - Cadastrar\n2 - Listar\n3 - Sair"));
      let texto = "";
      switch (opcao) {
        case 1:
          texto = "Opção cadastrar selecionada.";
          break;
        case 2:
          texto = "Opção listar selecionada.";
          break;
        case 3:
          texto = "Saindo do sistema...";
          break;
        default:
          texto = "Opção inválida.";
      }
      mostrar(texto);
      console.log(texto);
    }

    function questao7() {
      let produtos = [];
      produtos.push("Mouse");
      produtos.push("Teclado");
      produtos.push("Monitor");
      mostrar("Produtos:\n" + produtos.join("\n"));
      console.log(produtos);
    }

    function imprimirArray(vetor) {
      let texto = "";
      for (let i = 0; i < vetor.length; i++) {
        texto += vetor[i] + "\n";
      }
      return texto;
    }

    function questao8() {
      let linguagens = ["Java", "PHP", "JavaScript", "Python"];
      let texto = imprimirArray(linguagens);
      mostrar(texto);
      console.log(linguagens);
    }

    function questao9() {
      let numeros = [10, 20, 30, 40, 50];
      let soma = 0;
      for (let i = 0; i < numeros.length; i++) {
        soma += numeros[i];
      }
      mostrar("Soma total: " + soma);
      console.log(soma);
    }

    function questao10() {
      let notas = [7, 8, 9];
      let soma = 0;
      for (let i = 0; i < notas.length; i++) {
        soma += notas[i];
      }
      let media = soma / notas.length;
      mostrar("Média: " + media);
      console.log(media);
    }

    function questao11() {
      let media = Number(prompt("Digite a média do aluno:"));
      let situacao = media >= 7 ? "Aprovado" : "Reprovado";
      mostrar("Situação: " + situacao);
      console.log(situacao);
    }

    function questao12() {
      let nomes = ["João", "Maria", "Pedro", "Lucas"];
      let texto = "";
      for (let i = 0; i < nomes.length; i++) {
        texto += i + " - " + nomes[i] + "\n";
      }
      mostrar(texto);
      console.log(nomes);
    }

    function questao13() {
      let idades = [12, 18, 25, 16, 30, 14];
      let maiores = [];
      for (let i = 0; i < idades.length; i++) {
        if (idades[i] >= 18) {
          maiores.push(idades[i]);
        }
      }
      mostrar("Maiores de idade:\n" + maiores.join("\n"));
      console.log(maiores);
    }

    function questao14() {
      let cargo = prompt("Digite o cargo (A ou U):").toUpperCase();
      let texto = "";
      switch (cargo) {
        case "A":
          texto = "Admin";
          break;
        case "U":
          texto = "Usuário";
          break;
        default:
          texto = "Inválido";
      }
      mostrar("Cargo: " + texto);
      console.log(texto);
    }

    function adicionarNome(nome) {
      listaQ15.push(nome);
      return listaQ15;
    }

    function questao15() {
      let nome = prompt("Digite um nome:");
      let listaAtualizada = adicionarNome(nome);
      mostrar("Lista atualizada:\n" + listaAtualizada.join("\n"));
      console.log(listaAtualizada);
    }

    function questao16() {
      let notas = [8, 5, 7, 6, 9, 10];
      let aprovados = 0;
      for (let i = 0; i < notas.length; i++) {
        if (notas[i] >= 7) {
          aprovados++;
        }
      }
      mostrar("Quantidade de aprovados: " + aprovados);
      console.log(aprovados);
    }

    function questao17() {
      let opcao = Number(prompt("Menu:\n1 - Adicionar item\n2 - Listar itens"));
      let texto = "";
      switch (opcao) {
        case 1:
          let item = prompt("Digite o nome do item:");
          itensQ17.push(item);
          texto = "Item adicionado com sucesso.";
          break;
        case 2:
          texto = itensQ17.length > 0 ? "Itens:\n" + itensQ17.join("\n") : "Nenhum item cadastrado.";
          break;
        default:
          texto = "Opção inválida.";
      }
      mostrar(texto);
      console.log(itensQ17);
    }

    function questao18() {
      let pessoas = [
        { nome: "João", idade: 18 },
        { nome: "Maria", idade: 22 },
        { nome: "Carlos", idade: 17 }
      ];
      let texto = "Pessoas:\n";
      for (let i = 0; i < pessoas.length; i++) {
        texto += pessoas[i].nome + " - " + pessoas[i].idade + " anos\n";
      }
      mostrar(texto);
      console.table(pessoas);
    }

    function questao19() {
      let nomes = ["João", "Maria", "Carlos", "Ana"];
      let nomeProcurado = prompt("Digite o nome que deseja buscar:");
      let encontrado = false;
      let posicao = -1;

      for (let i = 0; i < nomes.length; i++) {
        if (nomes[i].toLowerCase() === nomeProcurado.toLowerCase()) {
          encontrado = true;
          posicao = i;
          break;
        }
      }

      if (encontrado) {
        mostrar("Nome encontrado na posição: " + posicao);
      } else {
        mostrar("Nome não encontrado.");
      }
    }

    function cadastrarAlunoSistema() {
      let nome = prompt("Digite o nome do aluno:");
      let nota = Number(prompt("Digite a nota do aluno:"));
      alunosSistema.push({ nome, nota });
    }

    function listarAlunosSistema() {
      if (alunosSistema.length === 0) {
        return "Nenhum aluno cadastrado.";
      }
      let texto = "Alunos cadastrados:\n";
      for (let i = 0; i < alunosSistema.length; i++) {
        texto += alunosSistema[i].nome + " - Nota: " + alunosSistema[i].nota + "\n";
      }
      return texto;
    }

    function calcularMediaSistema() {
      if (alunosSistema.length === 0) {
        return "Nenhum aluno cadastrado.";
      }
      let soma = 0;
      for (let i = 0; i < alunosSistema.length; i++) {
        soma += alunosSistema[i].nota;
      }
      let media = soma / alunosSistema.length;
      let situacao = media >= 7 ? "Aprovada" : "Reprovada";
      return "Média da turma: " + media.toFixed(2) + "\nSituação da turma: " + situacao;
    }

    function questao20() {
      let opcao;
      do {
        opcao = Number(prompt(
          "Sistema Completo:\n1 - Cadastrar aluno\n2 - Listar alunos\n3 - Calcular média\n4 - Sair"
        ));

        switch (opcao) {
          case 1:
            cadastrarAlunoSistema();
            mostrar("Aluno cadastrado com sucesso.");
            break;
          case 2:
            mostrar(listarAlunosSistema());
            break;
          case 3:
            mostrar(calcularMediaSistema());
            break;
          case 4:
            mostrar("Saindo do sistema...");
            break;
          default:
            mostrar("Opção inválida.");
        }
      } while (opcao !== 4);

      console.log(alunosSistema);
    }
  </script>
</body>
</html>
